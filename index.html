<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTIR — Coastal Tide Impact Research</title>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0f172a;overflow:hidden;}

#splash{
  width:100%;height:100vh;
  background:#0f172a;
  position:relative;
  overflow:hidden;
  font-family:'Inter Tight',system-ui,sans-serif;
}
canvas#bg{position:absolute;inset:0;width:100%;height:100%;}

#pier-wrap{
  position:absolute;
  left:50%;top:0;
  transform:translateX(-50%);
  width:160px;
  z-index:2;
}

#rings{position:absolute;inset:0;z-index:3;pointer-events:none;}

.ping-ring{
  position:absolute;
  border-radius:50%;
  border:1.5px solid rgba(14,165,233,0.7);
  transform:scale(0);
  opacity:0;
  pointer-events:none;
}

#readout{
  position:absolute;
  font-family:'Inter Tight',system-ui,sans-serif;
  font-size:.68rem;font-weight:500;letter-spacing:.1em;
  color:#0ea5e9;opacity:0;
  transition:opacity .3s ease;
  z-index:5;white-space:nowrap;
  background:rgba(15,23,42,0.75);
  padding:.2rem .5rem;border-radius:2px;
  border-left:2px solid #0ea5e9;
}

#reveal{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:6;pointer-events:none;
  gap:0;
}
.rev-eyebrow{
  font-family:'Inter Tight',system-ui,sans-serif;
  font-size:.68rem;font-weight:500;letter-spacing:.25em;
  text-transform:uppercase;color:#0ea5e9;
  opacity:0;transform:translateY(12px);
  transition:opacity .6s ease,transform .6s ease;
  margin-bottom:.6rem;
}
.rev-title{
  font-family:'Inter Tight',system-ui,sans-serif;
  font-size:clamp(2rem,5vw,3rem);font-weight:600;
  letter-spacing:-.03em;color:#f0f9ff;
  opacity:0;transform:translateY(12px);
  transition:opacity .6s ease .15s,transform .6s ease .15s;
  margin-bottom:.4rem;text-align:center;line-height:1.1;
}
.rev-sub{
  font-family:'Source Serif 4',Georgia,serif;
  font-size:.95rem;color:rgba(240,249,255,.55);
  opacity:0;transform:translateY(12px);
  transition:opacity .6s ease .28s,transform .6s ease .28s;
  margin-bottom:2rem;text-align:center;
}
.rev-btn{
  font-family:'Inter Tight',system-ui,sans-serif;
  font-size:.78rem;font-weight:500;text-transform:uppercase;
  letter-spacing:.12em;color:#0f172a;
  background:#0ea5e9;border:none;
  padding:.65rem 1.8rem;border-radius:3px;
  cursor:pointer;
  opacity:0;transform:translateY(12px);
  transition:opacity .6s ease .4s,transform .6s ease .4s,background .18s;
  pointer-events:none;
}
.rev-btn:hover{background:#38bdf8;}
.rev-btn.shown{pointer-events:auto;}
.rev-eyebrow.in,.rev-title.in,.rev-sub.in,.rev-btn.in{opacity:1;transform:translateY(0);}

#skip{
  position:absolute;bottom:1.2rem;right:1.5rem;
  font-family:'Inter Tight',system-ui,sans-serif;
  font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;
  color:#1e3a5a;cursor:pointer;z-index:10;
  transition:color .2s;
}
#skip:hover{color:#475569;}
</style>
</head>
<body>

<div id="splash">
  <canvas id="bg"></canvas>

  <div id="pier-wrap">
    <svg id="pier-svg" viewBox="0 0 160 320" width="160" height="320" xmlns="http://www.w3.org/2000/svg">
      <rect x="72" y="0" width="16" height="220" fill="#1e293b" rx="2"/>
      <rect x="72" y="0" width="16" height="4" fill="#334155" rx="2"/>
      <rect x="30" y="200" width="100" height="12" fill="#1e293b" rx="2"/>
      <rect x="30" y="200" width="100" height="3" fill="#334155" rx="1"/>
      <circle cx="44" cy="206" r="3" fill="#0f172a" stroke="#475569" stroke-width="0.8"/>
      <circle cx="116" cy="206" r="3" fill="#0f172a" stroke="#475569" stroke-width="0.8"/>
      <rect x="52" y="148" width="56" height="58" rx="3" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <line x1="52" y1="162" x2="108" y2="162" stroke="#0ea5e9" stroke-width="0.5" opacity="0.4" stroke-dasharray="3,3"/>
      <rect x="49" y="154" width="6" height="5" rx="1" fill="#293548" stroke="#475569" stroke-width="0.5"/>
      <rect x="105" y="154" width="6" height="5" rx="1" fill="#293548" stroke="#475569" stroke-width="0.5"/>
      <rect x="58" y="170" width="44" height="28" rx="1.5" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
      <text x="80" y="181" text-anchor="middle" font-family="Inter Tight,sans-serif" font-size="6" font-weight="700" fill="#64748b" letter-spacing="1">RADAR</text>
      <line x1="60" y1="183" x2="100" y2="183" stroke="#334155" stroke-width="0.4"/>
      <text x="80" y="192" text-anchor="middle" font-family="Inter Tight,sans-serif" font-size="5" fill="#475569" letter-spacing="1">GAUGE</text>
      <rect x="61" y="173" width="5" height="4" rx="1" fill="#0ea5e9" opacity="0.85" id="led1"/>
      <rect x="69" y="173" width="4" height="4" rx="1" fill="#0ea5e9" opacity="0.45" id="led2"/>
      <line x1="52" y1="172" x2="108" y2="172" stroke="#b8d400" stroke-width="1.5" opacity="0.8"/>
      <line x1="80" y1="206" x2="80" y2="220" stroke="#334155" stroke-width="1" stroke-dasharray="2,2"/>
      <circle cx="55" cy="151" r="2" fill="#0f172a" stroke="#475569" stroke-width="0.6"/>
      <circle cx="105" cy="151" r="2" fill="#0f172a" stroke="#475569" stroke-width="0.6"/>
      <circle cx="55" cy="203" r="2" fill="#0f172a" stroke="#475569" stroke-width="0.6"/>
      <circle cx="105" cy="203" r="2" fill="#0f172a" stroke="#475569" stroke-width="0.6"/>
      <line id="signal-line" x1="80" y1="206" x2="80" y2="206" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="3,3" opacity="0"/>
    </svg>
  </div>

  <div id="rings"></div>
  <div id="readout">READING: +1.84 m</div>

  <div id="reveal">
    <p class="rev-eyebrow">Cal Poly SLO · CCMS</p>
    <h1 class="rev-title">Coastal Tide<br>Impact Research</h1>
    <p class="rev-sub">Measuring sea level change along the Central Coast.</p>
    <button class="rev-btn" id="enter-btn" onclick="enterSite()">Enter site</button>
  </div>

  <p id="skip" onclick="skipIntro()">skip intro ↓</p>
</div>

<script>
(function(){
  var splash=document.getElementById('splash');
  var canvas=document.getElementById('bg');
  var ctx=canvas.getContext('2d');
  var ringsEl=document.getElementById('rings');
  var signalLine=document.getElementById('signal-line');
  var readout=document.getElementById('readout');
  var led1=document.getElementById('led1');
  var led2=document.getElementById('led2');
  var done=false;
  var W,H,waveT=0;

  function resize(){
    W=canvas.width=splash.clientWidth;
    H=canvas.height=splash.clientHeight;
  }
  resize();
  window.addEventListener('resize',resize);

  function drawBg(){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#0f172a';
    ctx.fillRect(0,0,W,H);
    var layers=[
      {amp:18,freq:0.010,speed:0.5,alpha:0.07,yf:0.58},
      {amp:12,freq:0.016,speed:0.8,alpha:0.055,yf:0.65},
      {amp:22,freq:0.007,speed:0.35,alpha:0.045,yf:0.50},
      {amp:8, freq:0.024,speed:1.0,alpha:0.04,yf:0.72},
      {amp:15,freq:0.013,speed:0.6,alpha:0.05,yf:0.43},
    ];
    layers.forEach(function(l){
      var by=H*l.yf;
      ctx.beginPath();ctx.moveTo(0,by);
      for(var x=0;x<=W;x+=3){
        var y=by
          +Math.sin(x*l.freq+waveT*l.speed)*l.amp
          +Math.sin(x*l.freq*1.7-waveT*l.speed*0.5)*l.amp*0.4;
        ctx.lineTo(x,y);
      }
      ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();
      var g=ctx.createLinearGradient(0,by-l.amp,0,by+l.amp*2);
      g.addColorStop(0,'rgba(14,165,233,'+(l.alpha*1.4)+')');
      g.addColorStop(0.5,'rgba(14,165,233,'+l.alpha+')');
      g.addColorStop(1,'rgba(15,23,42,0)');
      ctx.fillStyle=g;ctx.fill();
    });
    for(var i=0;i<5;i++){
      var sx=((waveT*18+i*W/4.5)%(W+40))-20;
      var sy=H*(0.48+i*0.05)+Math.sin(waveT*0.7+i)*8;
      var sg=ctx.createRadialGradient(sx,sy,0,sx,sy,7);
      sg.addColorStop(0,'rgba(248,250,252,0.06)');
      sg.addColorStop(1,'rgba(248,250,252,0)');
      ctx.fillStyle=sg;ctx.beginPath();ctx.arc(sx,sy,7,0,Math.PI*2);ctx.fill();
    }
    waveT+=0.018;
    requestAnimationFrame(drawBg);
  }
  drawBg();

  function spawnPing(originX,originY,delay){
    setTimeout(function(){
      if(done)return;
      var ring=document.createElement('div');
      ring.className='ping-ring';
      var size=220;
      ring.style.cssText='width:'+size+'px;height:'+size+'px;left:'+(originX-size/2)+'px;top:'+(originY-size/2)+'px;position:absolute;border-radius:50%;border:1.5px solid rgba(14,165,233,0.7);pointer-events:none;';
      ringsEl.appendChild(ring);
      var start=null;
      var dur=1400;
      function animRing(ts){
        if(!start)start=ts;
        var p=Math.min((ts-start)/dur,1);
        var eased=1-Math.pow(1-p,3);
        ring.style.transform='scale('+eased+')';
        ring.style.opacity=String((1-p)*0.75);
        ring.style.borderColor='rgba(14,165,233,'+(((1-p)*0.7))+')';
        if(p<1)requestAnimationFrame(animRing);
        else ring.remove();
      }
      requestAnimationFrame(animRing);
    },delay);
  }

  function animateSignal(gaugeY,waterY,delay){
    setTimeout(function(){
      if(done)return;
      var start=null;
      var dur=500;
      signalLine.setAttribute('opacity','0.6');
      function step(ts){
        if(!start)start=ts;
        var p=Math.min((ts-start)/dur,1);
        var currentY=gaugeY+(waterY-gaugeY)*p;
        signalLine.setAttribute('y2',currentY);
        signalLine.setAttribute('x2','80');
        if(p<1)requestAnimationFrame(step);
        else{
          signalLine.setAttribute('opacity','0');
          signalLine.setAttribute('y2',gaugeY);
        }
      }
      requestAnimationFrame(step);
    },delay);
  }

  function flashLEDs(){
    var on=true;
    var interval=setInterval(function(){
      led1.setAttribute('opacity',on?'0.85':'0.2');
      led2.setAttribute('opacity',on?'0.45':'0.1');
      on=!on;
    },180);
    setTimeout(function(){
      clearInterval(interval);
      led1.setAttribute('opacity','0.85');
      led2.setAttribute('opacity','0.45');
    },1200);
  }

  function showReadout(x,y){
    var readings=['READING: +1.84 m','READING: +1.91 m','READING: +1.78 m'];
    var r=readings[Math.floor(Math.random()*readings.length)];
    readout.textContent=r;
    readout.style.left=(x+20)+'px';
    readout.style.top=(y-12)+'px';
    readout.style.opacity='1';
    setTimeout(function(){readout.style.opacity='0';},900);
  }

  function revealContent(){
    if(done)return;
    done=true;
    setTimeout(function(){
      document.querySelector('.rev-eyebrow').classList.add('in');
      document.querySelector('.rev-title').classList.add('in');
      document.querySelector('.rev-sub').classList.add('in');
      var btn=document.querySelector('.rev-btn');
      btn.classList.add('in');
      setTimeout(function(){btn.classList.add('shown');},1000);
    },300);
  }

  function runSequence(){
    var gaugeY=206;
    var waterY=Math.round(H*0.60);
    var pingOriginX=Math.round(W/2);
    var pingOriginY=waterY;

    var pings=[{delay:400},{delay:1100},{delay:1800}];
    pings.forEach(function(p){
      animateSignal(gaugeY,waterY,p.delay);
      spawnPing(pingOriginX,pingOriginY,p.delay+480);
      setTimeout(function(){flashLEDs();},p.delay+200);
      setTimeout(function(){showReadout(pingOriginX,pingOriginY-20);},p.delay+500);
    });

    setTimeout(revealContent,3200);
  }

  setTimeout(runSequence,600);

  window.skipIntro=function(){revealContent();};

  window.enterSite=function(){
    splash.style.transition='opacity .5s ease';
    splash.style.opacity='0';
    setTimeout(function(){
      window.location.href='main.html';
    },500);
  };
})();
</script>

</body>
</html>
